<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conecta2</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(180deg, #0a1f44, #00c2b8);
    color: white;
}

/* HEADER */
.header {
    padding: 20px;
    display: flex;
    align-items: center;
}

.logo {
    width: 70px;
    border-radius: 15px;
    margin-right: 10px;
}

.title {
    font-size: 24px;
    font-weight: bold;
}

.subtitle {
    font-size: 14px;
    opacity: 0.8;
}

/* BUSCADOR */
.search {
    background: white;
    margin: 15px;
    padding: 15px;
    border-radius: 20px;
    color: #555;
}

/* BOTÓN */
.btn-main {
    background: #00c2b8;
    margin: 15px;
    padding: 15px;
    border-radius: 20px;
    text-align: center;
    font-weight: bold;
}

/* EMERGENCIAS */
.emergency {
    background: #ff3b3b;
    margin: 15px;
    padding: 15px;
    border-radius: 20px;
    text-align: center;
    font-weight: bold;
}

/* CATEGORÍAS */
.section {
    background: #f2f2f2;
    color: #333;
    margin-top: 20px;
    border-radius: 30px 30px 0 0;
    padding: 20px;
}

.section h2 {
    margin-bottom: 15px;
}

.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
}

.card {
    padding: 25px;
    border-radius: 20px;
    color: white;
    text-align: center;
    font-weight: bold;
}

/* COLORES DE CATEGORÍAS */
.c1 { background: #ff9f1c; }
.c2 { background: #ff595e; }
.c3 { background: #2ec4b6; }
.c4 { background: #9b5de5; }
.c5 { background: #4cc9f0; }
.c6 { background: #4361ee; }
.c7 { background: #06d6a0; }
.c8 { background: #f72585; }

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <img src="logo.png" class="logo">
    <div>
        <div class="title">Conecta2</div>
        <div class="subtitle">A tan solo un clic de encontrar lo que buscás</div>
    </div>
</div>

<!-- BUSCADOR -->
<div class="search">
    🔍 Buscar servicio o comercio...
</div>

<!-- BOTÓN -->
<div class="btn-main">
    Quiero aparecer en la app
</div>

<!-- EMERGENCIAS -->
<div class="emergency">
    🚨 Emergencias
</div>

<!-- CATEGORÍAS -->
<div class="section">
    <h2>Categorías</h2>

    <div class="grid">
        <div class="card c1">Servicios Hogar</div>
        <div class="card c2">Comida</div>
        <div class="card c3">Profesionales</div>
        <div class="card c4">Estética</div>
        <div class="card c5">Salud</div>
        <div class="card c6">Tecnología</div>
        <div class="card c7">Educación</div>
        <div class="card c8">Otros</div>
    </div>

</div>

</body>
</html>
