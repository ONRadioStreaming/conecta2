<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todo en Rojas</title>

<style>
  body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    font-family:Arial, Helvetica, sans-serif;
    color:white;
    background:linear-gradient(180deg,#0f5ed7,#4fb5ff);
  }

  .box{
    padding:20px;
  }

  .logo{
    width:120px;
    height:120px;
    border-radius:25px;
    overflow:hidden;
    margin:0 auto 20px;
    box-shadow:0 10px 25px rgba(0,0,0,.3);
  }

  .logo img{
    width:100%;
    height:100%;
    object-fit:cover;
  }

  h1{
    font-size:2rem;
    margin-bottom:10px;
  }

  p{
    font-size:1.1rem;
  }
</style>
</head>

<body>

<div class="box">
  <div class="logo">
    <img src="logo.png">
  </div>

  <h1>Todo en Rojas</h1>

  <p>
    Conectamos quienes venden<br>
    con quienes necesitan comprar
  </p>
</div>

<script>
  setTimeout(()=>{
    window.location.href = "servicios.html";
  }, 2000);
</script>

</body>
</html>
