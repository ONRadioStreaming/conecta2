<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Servicios para el Hogar - Conecta2</title>
  <style>
    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:linear-gradient(180deg,#2f69c6 0%,#9ab2d9 34%,#dfe8f2 100%);
      color:#12243a;
    }

    .app{
      max-width:480px;
      margin:0 auto;
      min-height:100vh;
    }

    .header{
      padding:18px 16px 22px;
      color:white;
    }

    .header-row{
      display:flex;
      align-items:center;
      gap:12px;
    }

    .back-btn{
      width:54px;
      height:54px;
      border-radius:18px;
      background:rgba(255,255,255,0.18);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:28px;
      font-weight:bold;
      color:white;
      text-decoration:none;
    }

    .header-title{
      font-size:18px;
      font-weight:bold;
    }

    .content{
      background:#edf2f7;
      border-radius:34px 34px 0 0;
      padding:18px 16px 28px;
      min-height:calc(100vh - 110px);
    }

    .search-box{
      background:white;
      border-radius:18px;
      padding:14px 16px;
      margin-bottom:16px;
      box-shadow:0 6px 14px rgba(0,0,0,0.06);
    }

    .search-box input{
      width:100%;
      border:0;
      outline:none;
      background:transparent;
      color:#364b63;
      font-size:16px;
      font-weight:bold;
    }

    .status-box{
      background:white;
      border-radius:18px;
      padding:14px 16px;
      margin-bottom:16px;
      box-shadow:0 6px 14px rgba(0,0,0,0.05);
      color:#4c6077;
      font-size:15px;
      font-weight:bold;
    }

    .card{
      background:white;
      border-radius:24px;
      padding:16px;
      margin-bottom:16px;
      box-shadow:0 8px 18px rgba(0,0,0,0.06);
    }

    .top{
      display:flex;
      gap:14px;
      align-items:flex-start;
    }

    .avatar{
      width:92px;
      height:92px;
      border-radius:22px;
      object-fit:cover;
      background:#d9e3ee;
      flex-shrink:0;
    }

    .info{
      flex:1;
    }

    .name{
      font-size:16px;
      font-weight:bold;
      color:#173a68;
      line-height:1.2;
      margin-bottom:4px;
    }

    .job{
      font-size:15px;
      font-weight:bold;
      color:#6a7380;
      margin-bottom:8px;
    }

    .status{
      font-size:14px;
      font-weight:bold;
      color:#17763f;
    }

    .desc{
      margin:16px 0 14px;
      color:#404f61;
      font-size:16px;
      line-height:1.5;
    }

    .tags{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-bottom:16px;
    }

    .tag{
      background:#eaf0f6;
      color:#204979;
      border-radius:999px;
      padding:10px 14px;
      font-size:14px;
      font-weight:bold;
      line-height:1;
    }

    .actions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    .btn-wa,.btn-call{
      border-radius:18px;
      padding:15px 12px;
      text-align:center;
      font-size:16px;
      font-weight:bold;
      text-decoration:none;
    }

    .btn-wa{
      background:#19ad4a;
      color:white;
    }

    .btn-call{
      background:#e8eef5;
      color:#24497a;
    }

    .empty{
      background:white;
      border-radius:20px;
      padding:18px;
      text-align:center;
      color:#607185;
      font-weight:bold;
      box-shadow:0 8px 18px rgba(0,0,0,0.05);
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="header-row">
        <a href="index.html" class="back-btn">←</a>
        <div class="header-title">Servicios para el Hogar</div>
      </div>
    </div>

    <div class="content">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Buscar plomero, electricista, jardinero...">
      </div>

      <div class="status-box" id="estado">Probando lectura...</div>

      <div id="resultado"></div>
    </div>
  </div>

  <script>
    var estado = document.getElementById("estado");
    var resultado = document.getElementById("resultado");
    var buscador = document.getElementById("searchInput");
    var url = "https://opensheet.elk.sh/1NOoO8TKcQkKprf8e34h3k3iekaNTxtfMeZ1sO6TO8fw/Hoja%201";
    var datosGuardados = [];

    function limpiar(valor){
      if(!valor) return "";
      return String(valor).trim();
    }

    function crearTags(medios, factura){
      var html = "";
      if(medios){
        var lista = medios.split(",");
        for(var i=0; i<lista.length; i++){
          var item = lista[i].trim();
          if(item !== ""){
            html += '<div class="tag">' + item + '</div>';
          }
        }
      }

      if(limpiar(factura).toLowerCase() === "si"){
        html += '<div class="tag">Hace factura</div>';
      }

      if(limpiar(factura).toLowerCase() === "no"){
        html += '<div class="tag">Sin factura</div>';
      }

      return html;
    }

    function dibujar(lista){
      if(lista.length === 0){
        resultado.innerHTML = '<div class="empty">No hay servicios disponibles en esta categoría.</div>';
        return;
      }

      var html = "";

      for(var i=0; i<lista.length; i++){
        var item = lista[i];
        var nombre = (limpiar(item.nombre) + " " + limpiar(item.apellido)).trim();
        if(nombre === "") nombre = "Prestador sin nombre";

        var descripcion = limpiar(item.descripcion);
        if(descripcion === "") descripcion = "Sin descripción disponible.";

        var telefono = limpiar(item.telefono).replace(/[^0-9]/g, "");
        var whatsapp = limpiar(item.whatsapp).replace(/[^0-9]/g, "");
        var horarios = limpiar(item.horarios);
        if(horarios === "") horarios = "Horario no informado";

        var foto = limpiar(item.foto_url);
        if(foto === "") foto = "https://via.placeholder.com/150";

        html += '<div class="card">';
        html +=   '<div class="top">';
        html +=     '<img src="' + foto + '" alt="' + nombre + '" class="avatar">';
        html +=     '<div class="info">';
        html +=       '<div class="name">' + nombre + '</div>';
        html +=       '<div class="job">Servicio para el hogar</div>';
        html +=       '<div class="status">Disponible ahora</div>';
        html +=     '</div>';
        html +=   '</div>';

        html +=   '<div class="desc">' + descripcion + '</div>';

        html +=   '<div class="tags">';
        html +=     crearTags(limpiar(item.medios_pago), limpiar(item.factura));
        html +=   '</div>';

        html +=   '<div class="actions">';
        html +=     '<a class="btn-wa" href="https://wa.me/54' + whatsapp + '" target="_blank">WhatsApp</a>';
        html +=     '<a class="btn-call" href="tel:' + telefono + '">Llamar</a>';
        html +=   '</div>';
        html += '</div>';
      }

      resultado.innerHTML = html;
    }

    fetch(url)
      .then(function(response){
        estado.innerHTML = "Conexión con la base OK. Leyendo datos...";
        return response.json();
      })
      .then(function(data){
        estado.innerHTML = "Datos recibidos: " + data.length;

        var filtrados = data.filter(function(item){
          return limpiar(item.estado).toLowerCase() === "activo" &&
                 limpiar(item.categoria).toLowerCase() === "servicios para el hogar";
        });

        datosGuardados = filtrados;
        estado.innerHTML = "Servicios encontrados: " + filtrados.length;
        dibujar(filtrados);
      })
      .catch(function(error){
        estado.innerHTML = "Error al leer la planilla.";
        resultado.innerHTML = '<div class="empty">' + error + '</div>';
      });

    buscador.addEventListener("input", function(){
      var valor = this.value.toLowerCase().trim();

      var filtrados = datosGuardados.filter(function(item){
        var texto = (
          limpiar(item.nombre) + " " +
          limpiar(item.apellido) + " " +
          limpiar(item.descripcion) + " " +
          limpiar(item.direccion)
        ).toLowerCase();

        return texto.indexOf(valor) !== -1;
      });

      dibujar(filtrados);
    });
  </script>
</body>
</html>
