<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Admin - Conecta2</title>

<style>

body{
font-family:Arial;
margin:0;
background:#0d1622;
color:white;
display:flex;
min-height:100vh;
}

.sidebar{
width:260px;
background:#09111a;
padding:20px;
border-right:1px solid #222;
}

.sidebar h2{
margin-top:0;
}

.menu button{
width:100%;
padding:12px;
margin-bottom:10px;
border:none;
background:#182537;
color:white;
cursor:pointer;
border-radius:6px;
}

.menu button:hover{
background:#22354d;
}

.main{
flex:1;
padding:30px;
}

.card{
background:#182537;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #333;
text-align:left;
}

button.action{
background:#16c784;
border:none;
padding:8px 10px;
color:white;
cursor:pointer;
border-radius:6px;
}

button.logout{
background:#ff5d5d;
margin-top:20px;
width:100%;
padding:12px;
border:none;
border-radius:6px;
cursor:pointer;
}

.hidden{
display:none;
}

</style>
</head>

<body>

<div class="sidebar">

<h2>Conecta2</h2>

<div class="menu">

<button onclick="mostrarVista('dashboard')">Dashboard</button>

<button onclick="mostrarVista('pendientes')">Pendientes manuales</button>

<button onclick="mostrarVista('membresias')">Membresías</button>

<button onclick="mostrarVista('comercios')">Comercios</button>

<button onclick="mostrarVista('servicios')">Servicios</button>

</div>

<button class="logout" onclick="logout()">Cerrar sesión</button>

</div>

<div class="main">

<div id="dashboard">

<div class="card">
<h3>Resumen</h3>

<p>Membresías activas: <b id="statActivas">0</b></p>
<p>Por vencer: <b id="statVencer">0</b></p>
<p>Pendientes manuales: <b id="statPendientes">0</b></p>

<button onclick="cargarResumen()">Actualizar</button>

</div>

</div>

<div id="pendientes" class="hidden">

<div class="card">

<h3>Pagos manuales pendientes</h3>

<table>

<thead>

<tr>
<th>ID</th>
<th>Negocio</th>
<th>Tipo</th>
<th>Teléfono</th>
<th>Plan</th>
<th>Medio</th>
<th>Pagó</th>
<th>Acción</th>
</tr>

</thead>

<tbody id="tablaPendientes">

<tr>
<td colspan="8">Cargando...</td>
</tr>

</tbody>

</table>

</div>

</div>

</div>

<script>

const SCRIPT_URL="https://script.google.com/macros/s/AKfycbxUCqWb6pYziwFrHWwXgSNwDfs4dt2KmdEZS18qFxcqlrSF4ywXdrDSrRM_Efka8Iij/exec"

function mostrarVista(v){

document.querySelectorAll(".main > div").forEach(d=>d.classList.add("hidden"))

document.getElementById(v).classList.remove("hidden")

}

async function postAction(action,data={}){

const formData=new FormData()

formData.append("action",action)

for(const k in data){
formData.append(k,data[k])
}

const r=await fetch(SCRIPT_URL,{
method:"POST",
body:formData
})

return await r.json()

}

async function cargarResumen(){

const r=await postAction("resumenAdmin")

if(!r.ok)return

document.getElementById("statActivas").innerText=r.activas
document.getElementById("statVencer").innerText=r.porVencer
document.getElementById("statPendientes").innerText=r.pendientes

}

async function cargarPendientes(){

const r=await postAction("listarPendientesManuales")

const tbody=document.getElementById("tablaPendientes")

if(!r.ok){
tbody.innerHTML="<tr><td colspan='8'>Error cargando</td></tr>"
return
}

if(!r.pendientes || r.pendientes.length==0){
tbody.innerHTML="<tr><td colspan='8'>No hay pendientes</td></tr>"
return
}

let html=""

r.pendientes.forEach(p=>{

html+=`
<tr>

<td>${p.id_membresia}</td>
<td>${p.nombre_negocio}</td>
<td>${p.tipo_registro}</td>
<td>${p.telefono}</td>
<td>${p.plan}</td>
<td>${p.medio_pago}</td>

<td>
<input type="checkbox" id="check-${p.fila}">
</td>

<td>
<button class="action" onclick="activarManual(${p.fila})">Activar</button>
</td>

</tr>
`

})

tbody.innerHTML=html

}

async function activarManual(fila){

const check=document.getElementById("check-"+fila)

if(!check.checked){
alert("Marcá primero que pagó")
return
}

const r=await postAction("activarMembresiaManual",{fila:fila})

if(r.ok){

alert("Membresía activada")

cargarPendientes()

cargarResumen()

}else{

alert("Error")

}

}

function logout(){

localStorage.removeItem("conecta2_admin_session")

window.location.href="index.html"

}

cargarResumen()

cargarPendientes()

</script>

</body>
</html>
