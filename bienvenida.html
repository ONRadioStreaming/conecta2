<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bienvenido</title>

<style>
  body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    font-family:Arial, Helvetica, sans-serif;
    color:white;
    background:linear-gradient(180deg,#0f5ed7,#4fb5ff);
    overflow:hidden;
  }

  .container{
    animation:fadeIn 1s ease;
    padding:20px;
  }

  .logo{
    width:120px;
    height:120px;
    border-radius:24px;
    overflow:hidden;
    margin:0 auto 20px;
    box-shadow:0 10px 25px rgba(0,0,0,.3);
    animation:zoom 1s ease;
  }

  .logo img{
    width:100%;
    height:100%;
    object-fit:cover;
  }

  h1{
    font-size:2rem;
    margin-bottom:10px;
    font-weight:900;
  }

  p{
    font-size:1.1rem;
    opacity:.95;
  }

  @keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
  }

  @keyframes zoom{
    from{transform:scale(0.7);}
    to{transform:scale(1);}
  }
</style>
</head>

<body>

<div class="container">
  
  <div class="logo">
    <img src="logo.png" alt="Todo en Rojas">
  </div>

  <h1>Todo en Rojas</h1>

  <p>
    La app que conecta<br>
    a quienes quieren vender<br>
    con quienes necesitan comprar
  </p>

</div>

<script>
  // Redirección automática
  setTimeout(()=>{
    window.location.href = "index.html";
  }, 2500); // 2.5 segundos
</script>

</body>
</html>
